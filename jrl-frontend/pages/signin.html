<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — JRL</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:22px;">
      <a class="brand" href="../index.html" style="justify-content:center; display:inline-flex;">
        <span class="brand-mark">JR</span>
        <span class="brand-name">JRL</span>
      </a>
    </div>
    <div class="card">
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-sub">Manage your routes and policies.</p>

      <div class="form-error" id="formError"></div>

      <form id="signinForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="ada@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign in</button>
      </form>
    </div>
    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
  document.getElementById('signinForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');
    errorEl.classList.remove('visible');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    try {
      await JRL.signIn({ email, password });
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
