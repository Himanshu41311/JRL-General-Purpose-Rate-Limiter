<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — JRL</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:22px;">
      <a class="brand" href="../index.html" style="justify-content:center; display:inline-flex;">
        <span class="brand-mark">JR</span>
        <span class="brand-name">JRL</span>
      </a>
    </div>
    <div class="card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Register routes and attach rate-limit policies to them.</p>

      <div class="form-error" id="formError"></div>

      <form id="signupForm">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" required autocomplete="name" placeholder="Ada Lovelace">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="ada@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="new-password" minlength="6" placeholder="At least 6 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign up</button>
      </form>
    </div>
    <p class="auth-switch">Already have an account? <a href="signin.html">Sign in</a></p>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');
    errorEl.classList.remove('visible');

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';

    try {
      await JRL.signUp({ name, email, password });
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign up';
    }
  });
</script>
</body>
</html>
