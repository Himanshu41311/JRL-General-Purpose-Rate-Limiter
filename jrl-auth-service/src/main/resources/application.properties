# =========================
# Server
# =========================
server.port=8081
spring.application.name=jrl-auth-service

# =========================
# Database — Supabase Postgres (source of truth for users, routes, policies)
# =========================
# Fill these in from Supabase: Project Settings -> Database -> Connection string.
# Defaults here are placeholders and will fail to connect until you set the real
# values, either directly below or via environment variables (preferred — keeps
# real credentials out of the file you might commit/hand around).
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.YOUR-PROJECT-REF.supabase.co:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# `update` auto-creates/updates the users/routes/policies tables on startup from the
# @Entity classes — convenient for an academic project, but it's not how you'd manage
# schema changes on a real database (use a migration tool like Flyway/Liquibase instead).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# Redis — same instance the rate limiter proxy reads from. Routes/policies get
# dual-written here (see RedisCacheService) in addition to Postgres, in the exact
# JSON shape RouteLookupService/PolicyLookupService expect: "route:{routeId}" and
# "route-policies:{routeId}".
# =========================
spring.data.redis.host=${REDIS_HOST:awake-boa-84902.upstash.io}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:gQAAAAAAAUumAAIgcDExZDRmNGRjYTFkNzc0MmVkOTgzMGEzMDQ1NGZjNzZmOA}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

# =========================
# JWT
# =========================
# DEV SECRET — this is committed in a public-ish sample file, which is fine for a
# local academic project but NOT how you'd do this for anything real. For real use,
# generate your own (e.g. `openssl rand -base64 64`) and set it via an environment
# variable instead: JRL_JWT_SECRET=... (see the ${} default below).
jrl.jwt.secret=${JRL_JWT_SECRET:c2FtcGxlLWRldi1vbmx5LXNlY3JldC1kby1ub3QtdXNlLWluLXByb2R1Y3Rpb24tcGxlYXNlLXJvdGF0ZS10aGlzLXZhbHVlLW9r}
jrl.jwt.expiration-ms=86400000

# =========================
# CORS — the frontend is opened as a static file (or via a plain static server),
# so allow it broadly for this academic setup rather than fighting file:// origins.
# =========================
jrl.cors.allowed-origins=*

logging.level.com.jrl.auth=DEBUG
