# =========================
# Server
# =========================
# Railway (and most PaaS platforms) assign a port dynamically via the PORT
# env var and only route external traffic to whatever the app actually binds
# to — a hardcoded port here means the container runs fine internally but is
# unreachable from outside. ${PORT:8080} falls back to 8080 for local dev
# where that env var isn't set.
server.port=${PORT:8080}
spring.application.name=rate-limiter-service

# =========================
# Rate limiter behavior (bound by RateLimiterProperties)
# =========================
# What to do with a request when Redis is unavailable / the circuit is open.
# OPEN   = fail open   (allow the request through, unprotected but available)
# CLOSED = fail closed (reject the request, protected but unavailable) — default
rlaas.redis.failure-mode=CLOSED

# TTL for a "route not found" negative-cache entry. Kept short so a route
# that was just created is visible quickly, while still limiting how often
# a nonexistent routeId can force a Redis round trip (scan/enumeration protection).
rlaas.cache.not-found-ttl-seconds=5

# Reserved, not currently used — see RouteLookupService javadoc for why a
# local TTL cache for *found* routes/policies isn't used here.
rlaas.cache.route-ttl-seconds=300
rlaas.cache.policy-ttl-seconds=300

# =========================
# Circuit breaker (Redis)
# =========================
# If >=50% of the last 20 Redis calls fail, trip the breaker (every call
# short-circuits with CallNotPermittedException instead of hitting a down
# Redis) for 10s, then allow 5 probe calls through to check recovery.
resilience4j.circuitbreaker.instances.redis.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.redis.sliding-window-size=20
resilience4j.circuitbreaker.instances.redis.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.redis.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.redis.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.redis.automatic-transition-from-open-to-half-open-enabled=true

# =========================
# Redis
# =========================
spring.data.redis.host=awake-boa-84902.upstash.io
